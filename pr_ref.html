<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政府新聞稿自動排版工具</title>
    <!-- 引入 docx 庫用於生成 Word 文件 -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <!-- 引入 FileSaver 用於觸發檔案下載 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            max-width: 900px; 
            margin: auto; 
            background-color: #f0f4f8; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 5px; 
        }
        .subtitle { 
            text-align: center; 
            color: #7f8c8d; 
            margin-bottom: 25px; 
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #34495e; 
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #bdc3c7; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        button { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            font-weight: bold; 
            transition: background-color 0.3s;
        }
        button:hover { 
            background-color: #2980b9; 
        }
        button:disabled { 
            background-color: #95a5a6; 
            cursor: not-allowed; 
        }
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 15px;
        }
        #preview { 
            margin-top: 30px; 
            border-collapse: collapse; 
            width: 100%; 
            display: none; 
            font-size: 14px;
        }
        #preview th, #preview td { 
            border: 1px solid #ecf0f1; 
            padding: 12px; 
            text-align: left; 
            vertical-align: top; 
            width: 50%; 
            white-space: pre-wrap; 
        }
        #preview th { 
            background-color: #f7f9fa; 
            color: #2c3e50; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 政府新聞稿一鍵 Word 排版工具</h2>
    <p class="subtitle">支援各類政府新聞公報及部門網頁</p>
    
    <div class="input-group">
        <label>中文新聞稿網址：</label>
        <input type="text" id="zhUrl" value="https://www.info.gov.hk/gia/general/202603/15/P2026031300594.htm?fontSize=1" placeholder="請貼上中文網址">
    </div>
    
    <div class="input-group">
        <label>英文新聞稿網址：</label>
        <input type="text" id="enUrl" value="https://www.info.gov.hk/gia/general/202603/15/P2026031300569.htm?fontSize=1" placeholder="請貼上英文網址">
    </div>

    <button id="convertBtn" onclick="processUrls()">📥 獲取內容並下載 Word (DOCX)</button>
    <p id="status"></p>

    <table id="preview">
        <thead>
            <tr>
                <th>中文內容預覽</th>
                <th>英文內容預覽</th>
            </tr>
        </thead>
        <tbody id="previewBody"></tbody>
    </table>
</div>

<script>
    async function fetchContent(url) {
        let htmlStr = null;
        const targetUrl = url.split('?')[0] + `?t=${Date.now()}`;

        const proxies = [
            { url: `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, type: 'json' },
            { url: `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`, type: 'text' },
            { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`, type: 'text' }
        ];

        for (const proxy of proxies) {
            try {
                console.log(`正在嘗試代理: ${proxy.url}`);
                const response = await fetch(proxy.url);
                if (response.ok) {
                    htmlStr = (proxy.type === 'json') ? (await response.json()).contents : await response.text();
                    if (htmlStr && (htmlStr.includes('pressrelease') || htmlStr.includes('GIA') || htmlStr.length > 2000)) break;
                }
            } catch (e) { console.warn("代理失敗:", e.message); }
        }

        if (!htmlStr) throw new Error('無法抓取網頁內容，請檢查網址或稍後再試。');
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(htmlStr, "text/html");
        
        let pageTitle = doc.title || "";
        pageTitle = pageTitle.replace(/(\s*[-|]\s*)?(Press Releases|The Government of the HKSAR|香港特別行政區政府新聞公報|新聞公報).*$/i, "").trim();

        function extractText(node) {
            if (!node) return "";
            let text = "";
            for (let child of node.childNodes) {
                if (child.nodeType === 3) text += child.nodeValue;
                else if (child.nodeType === 1) {
                    const tag = child.tagName.toLowerCase();
                    if (tag === "br") text += "\n";
                    else if (["p", "div", "h1", "h2", "h3"].includes(tag)) text += "\n" + extractText(child) + "\n";
                    else text += extractText(child);
                }
            }
            return text;
        }

        const bodyNode = doc.getElementById("pressrelease") || doc.querySelector(".pressrelease") || doc.querySelector("#content") || doc.body;
        const fullText = extractText(bodyNode);
        const paras = fullText.split('\n').map(p => p.trimEnd()).filter(p => p.trim().length > 0);
        
        return { title: pageTitle, paras: paras };
    }

    async function processUrls() {
        const zhUrl = document.getElementById('zhUrl').value.trim();
        const enUrl = document.getElementById('enUrl').value.trim();
        const statusLabel = document.getElementById('status');
        const btn = document.getElementById('convertBtn');
        const previewBody = document.getElementById('previewBody');

        if (!zhUrl || !enUrl) { statusLabel.innerText = "⚠️ 請輸入中英文網址"; return; }

        try {
            btn.disabled = true;
            statusLabel.innerText = "⏳ 正在抓取資料...";
            const [zhData, enData] = await Promise.all([fetchContent(zhUrl), fetchContent(enUrl)]);

            // 智能識別真實標題
            let realZhTitle = zhData.paras.find(p => p.match(/立法會.+題/)) || zhData.title;
            let realEnTitle = enData.paras.find(p => p.match(/LCQ\d+/i)) || enData.title;

            // 改良版清理邏輯：只清理開頭的元數據，遇到第一個長句（正文）就停止
            function cleanMetadata(paras, titleStr) {
                let startIdx = 0;
                for (let i = 0; i < Math.min(10, paras.length); i++) {
                    const p = paras[i];
                    const isStars = p.replace(/\s/g, '').includes('***') || p.replace(/\s/g, '').includes('＊＊＊');
                    const isDate = p.match(/\d{4}年\d{1,2}月\d{1,2}日/) || p.match(/(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)/i);
                    const isTitle = titleStr && p.includes(titleStr.substring(0, 10));
                    
                    if (isStars || isDate || isTitle || p.length < 5) startIdx = i + 1;
                    else break; // 遇到正常段落就停止清理
                }
                return paras.slice(startIdx);
            }

            const finalZh = [realZhTitle, "＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊", "網頁連結：" + zhUrl, ...cleanMetadata(zhData.paras, realZhTitle)];
            const finalEn = [realEnTitle, "********************************************", "Website URL: " + enUrl, ...cleanMetadata(enData.paras, realEnTitle)];

            const maxLen = Math.max(finalZh.length, finalEn.length);
            previewBody.innerHTML = "";
            for (let i = 0; i < maxLen; i++) {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${finalZh[i] || ""}</td><td>${finalEn[i] || ""}</td>`;
                previewBody.appendChild(tr);
            }
            document.getElementById('preview').style.display = "table";

            generateDocx(finalZh, finalEn, maxLen, realEnTitle.replace(/[\\/:*?"<>|]/g, "_"));
            statusLabel.innerText = "🎉 成功！Word 檔案已下載。";
        } catch (error) {
            statusLabel.innerText = "❌ 錯誤: " + error.message;
        } finally { btn.disabled = false; }
    }

    function generateDocx(zhParas, enParas, maxLen, docTitle) {
        const rows = [];
        for (let i = 0; i < maxLen; i++) {
            rows.push(new docx.TableRow({
                children: [
                    new docx.TableCell({ children: [new docx.Paragraph({ text: zhParas[i] || "" }), new docx.Paragraph("")], width: { size: 50, type: docx.WidthType.PERCENTAGE } }),
                    new docx.TableCell({ children: [new docx.Paragraph({ text: enParas[i] || "" }), new docx.Paragraph("")], width: { size: 50, type: docx.WidthType.PERCENTAGE } })
                ]
            }));
        }

        const doc = new docx.Document({
            sections: [{
                properties: { page: { margin: { top: 567, bottom: 567, left: 567, right: 567 } } },
                children: [new docx.Table({ width: { size: 100, type: docx.WidthType.PERCENTAGE }, borders: docx.TableBorders.NONE, rows: rows })]
            }]
        });

        docx.Packer.toBlob(doc).then(blob => saveAs(blob, `${docTitle}.docx`));
    }
</script>
</body>
</html>
