<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>政府新聞稿自動排版工具</title>
    <!-- 引入 docx 庫用於生成 Word 文件 -->
    <script src="https://unpkg.com/docx@7.8.2/build/index.js"></script>
    <!-- 引入 FileSaver 用於觸發檔案下載 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            max-width: 900px; 
            margin: auto; 
            background-color: #f0f4f8; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h2 { 
            color: #2c3e50; 
            text-align: center; 
            margin-bottom: 5px; 
        }
        .subtitle { 
            text-align: center; 
            color: #7f8c8d; 
            margin-bottom: 25px; 
        }
        .input-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: bold; 
            color: #34495e; 
        }
        input[type="text"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #bdc3c7; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 14px; 
        }
        button { 
            background-color: #3498db; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            width: 100%; 
            font-weight: bold; 
            transition: background-color 0.3s;
        }
        button:hover { 
            background-color: #2980b9; 
        }
        button:disabled { 
            background-color: #95a5a6; 
            cursor: not-allowed; 
        }
        #status { 
            margin-top: 15px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 15px;
        }
        #preview { 
            margin-top: 30px; 
            border-collapse: collapse; 
            width: 100%; 
            display: none; 
            font-size: 14px;
        }
        #preview th, #preview td { 
            border: 1px solid #ecf0f1; 
            padding: 12px; 
            text-align: left; 
            vertical-align: top; 
            width: 50%; 
            white-space: pre-wrap; /* 確保預覽時也能顯示段落開頭的空格縮排 */
            tab-size: 4; /* 設定網頁預覽的 Tab 寬度 */
        }
        #preview th { 
            background-color: #f7f9fa; 
            color: #2c3e50; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 政府新聞稿一鍵 Word 排版工具</h2>
    <p class="subtitle">支援 info.gov.hk 及各大政府部門 (如 tlb.gov.hk) 的新聞稿</p>
    
    <div class="input-group">
        <label>中文新聞稿網址：</label>
        <input type="text" id="zhUrl" value="https://www.tlb.gov.hk/tc/legislative/transport/replies/2025/20251022c.html" placeholder="例如: https://www.info.gov.hk/... 或 https://www.tlb.gov.hk/...">
    </div>
    
    <div class="input-group">
        <label>英文新聞稿網址：</label>
        <input type="text" id="enUrl" value="https://www.tlb.gov.hk/eng/legislative/transport/replies/2025/20251022c.html" placeholder="例如: https://www.info.gov.hk/... 或 https://www.tlb.gov.hk/...">
    </div>

    <button id="convertBtn" onclick="processUrls()">📥 獲取內容並下載 Word (DOCX)</button>
    <p id="status"></p>

    <table id="preview">
        <thead>
            <tr>
                <th>中文內容預覽</th>
                <th>英文內容預覽</th>
            </tr>
        </thead>
        <tbody id="previewBody"></tbody>
    </table>
</div>

<script>
    // 利用免費代理繞過瀏覽器跨區限制，加入備用代理機制
    async function fetchContent(url) {
        let htmlStr = null;
        
        // 定義多個免費代理伺服器，自動輪詢以增加成功率
        const proxies = [
            { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, type: 'text' },
            { url: `https://corsproxy.io/?${encodeURIComponent(url)}`, type: 'text' },
            { url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, type: 'json' }
        ];

        for (const proxy of proxies) {
            try {
                console.log(`正在嘗試代理: ${proxy.url}`);
                const response = await fetch(proxy.url);
                
                if (response.ok) {
                    if (proxy.type === 'json') {
                        const data = await response.json();
                        htmlStr = data.contents;
                    } else {
                        htmlStr = await response.text();
                    }
                    
                    if (htmlStr && htmlStr.length > 500) {
                        console.log('代理連線成功！');
                        break; 
                    }
                }
            } catch (e) {
                console.warn(`代理失敗: ${proxy.url}`, e);
            }
        }

        if (!htmlStr || htmlStr.length < 500) {
            throw new Error('所有代理伺服器都無法連線或抓取不到有效內容');
        }
        
        try {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlStr, "text/html");
            
            let pageTitle = doc.title || "";
            pageTitle = pageTitle.replace(/(\s*[-|]\s*)?(Press Releases|The Government of the Hong Kong Special Administrative Region|香港特別行政區政府新聞公報|新聞公報|香港特别行政区政府新闻公报|Transport and Logistics Bureau|運輸及物流局).*$/i, "").trim();

            function extractTextWithNewlines(node) {
                if (!node) return "";
                let text = "";
                for (let child of node.childNodes) {
                    if (child.nodeType === Node.TEXT_NODE) {
                        text += child.nodeValue;
                    } else if (child.nodeType === Node.ELEMENT_NODE) {
                        const tagName = child.tagName.toLowerCase();
                        if (tagName === "br") {
                            text += "\n";
                        } else if (tagName === "p" || tagName === "div" || tagName === "h1" || tagName === "h2") {
                            text += "\n" + extractTextWithNewlines(child) + "\n";
                        } else {
                            text += extractTextWithNewlines(child);
                        }
                    }
                }
                return text;
            }
            
            const prTitleNode = doc.getElementById("pr_title") || doc.querySelector("h1");
            let bodyNode = doc.getElementById("pressrelease") || 
                           doc.querySelector(".pressrelease") ||
                           doc.getElementById("content") ||
                           doc.querySelector("#main") ||
                           doc.querySelector("main") ||
                           doc.querySelector(".content");
            
            if (!bodyNode) {
                const junk = doc.querySelectorAll("script, style, nav, header, footer, aside, .menu, #menu, .sidebar, #sidebar, iframe, noscript");
                junk.forEach(el => el.remove());
                bodyNode = doc.body;
            }

            let fullText = "";
            
            if (prTitleNode && !bodyNode.contains(prTitleNode)) {
                fullText += extractTextWithNewlines(prTitleNode) + "\n";
            }
            fullText += extractTextWithNewlines(bodyNode);
            
            // 按換行切割段落。改用 trim() 將所有不規則的空白清空，確保稍後可以統一加入標準的 Tab
            let paras = fullText.split('\n')
                .map(p => p.trim())
                .filter(p => p.length > 0);
            
            return { title: pageTitle, paras: paras };

        } catch (error) {
            console.error("解析錯誤:", error);
            throw new Error("成功抓取網頁，但解析內容失敗");
        }
    }

    // 主要處理功能
    async function processUrls() {
        const zhUrl = document.getElementById('zhUrl').value.trim();
        const enUrl = document.getElementById('enUrl').value.trim();
        const statusLabel = document.getElementById('status');
        const btn = document.getElementById('convertBtn');
        const previewTable = document.getElementById('preview');
        const previewBody = document.getElementById('previewBody');

        if (!zhUrl || !enUrl) {
            statusLabel.style.color = "#e74c3c";
            statusLabel.innerText = "⚠️ 請填寫晒中英文兩條網址！";
            return;
        }

        try {
            btn.disabled = true;
            statusLabel.style.color = "#2980b9";
            statusLabel.innerText = "⏳ 正在跨網為你抓取資料，請稍候幾秒...";
            previewTable.style.display = "none";
            previewBody.innerHTML = "";

            const [zhData, enData] = await Promise.all([
                fetchContent(zhUrl),
                fetchContent(enUrl)
            ]);

            if (zhData.paras.length === 0 || enData.paras.length === 0) {
                statusLabel.style.color = "#e74c3c";
                statusLabel.innerText = "❌ 搵唔到新聞稿正文，請確定網址正不正確。";
                btn.disabled = false;
                return;
            }

            statusLabel.style.color = "#27ae60";
            statusLabel.innerText = "✅ 成功讀取內容！正在幫你畫格仔同匯出 Word...";

            let realEnTitle = enData.title; 
            let realZhTitle = zhData.title;

            const foundEnTitle = enData.paras.find(p => p.match(/LCQ\d+\s*:/i));
            if (foundEnTitle) realEnTitle = foundEnTitle;

            const foundZhTitle = zhData.paras.find(p => p.match(/立法會.+題\s*[：:]/));
            if (foundZhTitle) realZhTitle = foundZhTitle;

            let docTitle = realEnTitle || "中英對照新聞稿";
            docTitle = docTitle.replace(/[\\/:*?"<>|]/g, "_").trim();
            if (docTitle.length > 120) docTitle = docTitle.substring(0, 120).trim();

            function cleanTopParas(paras, titleStr, isZh) {
                let startIdx = 0;
                for(let i = 0; i < Math.min(15, paras.length); i++) {
                    const p = paras[i];
                    const isStars = p.replace(/\s/g, '').split('*').length > 4 || p.replace(/\s/g, '').split('＊').length > 4;
                    const isTitleMatch = titleStr && titleStr.length > 5 && (p.includes(titleStr) || titleStr.includes(p));
                    const isSpecificFormat = isZh ? p.match(/立法會.+題\s*[：:]/) : p.match(/LCQ\d+\s*:/i);
                    const isDateOrMeta = p.match(/(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),\s+[a-zA-Z]+/i) || p.match(/^\d{4}年\d{1,2}月\d{1,2}日/);
                    
                    if (isStars || isTitleMatch || isSpecificFormat || isDateOrMeta) {
                        startIdx = i + 1; 
                    }
                }
                return paras.slice(startIdx);
            }

            let cleanedZhParas = cleanTopParas(zhData.paras, realZhTitle, true);
            let cleanedEnParas = cleanTopParas(enData.paras, realEnTitle, false);

            const zhStars = "＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊＊";
            const enStars = "********************************************";

            // 合併：[真實標題, 星號分隔線, 原始網址, 真正的正文 (每一段前面強制加入 \t Tab字元)]
            const finalZhParas = [realZhTitle, zhStars, "網頁連結：" + zhUrl, ...cleanedZhParas.map(p => "\t" + p)];
            const finalEnParas = [realEnTitle, enStars, "Website URL: " + enUrl, ...cleanedEnParas.map(p => "\t" + p)];

            const maxLen = Math.max(finalZhParas.length, finalEnParas.length);
            for (let i = 0; i < maxLen; i++) {
                const tr = document.createElement("tr");
                const tdZh = document.createElement("td");
                tdZh.innerText = finalZhParas[i] || "";
                const tdEn = document.createElement("td");
                tdEn.innerText = finalEnParas[i] || "";
                tr.appendChild(tdZh);
                tr.appendChild(tdEn);
                previewBody.appendChild(tr);
            }
            previewTable.style.display = "table";

            // 生成並下載 DOCX 檔案
            generateDocx(finalZhParas, finalEnParas, maxLen, docTitle);
            
            setTimeout(() => {
                statusLabel.innerText = "🎉 大功告成！Word 檔案已經彈出下載。";
            }, 1000);

        } catch (error) {
            statusLabel.style.color = "#e74c3c";
            statusLabel.innerText = `❌ 發生錯誤：${error.message} (可能網址無效或被防火牆阻擋)`;
        } finally {
            btn.disabled = false;
        }
    }

    // 將段落砌成 Word 雙列表格
    function generateDocx(zhParas, enParas, maxLen, docTitle) {
        const tableRows = [];
        
        // 專門處理帶有 Tab (\t) 的段落，確保 Word 正確識別為真正的製表符
        const createParagraph = (text) => {
            if (text.startsWith('\t')) {
                return new docx.Paragraph({
                    children: [
                        new docx.TextRun("\t"), // 加入原生的 Tab 符號
                        new docx.TextRun(text.substring(1)) // 接續剩下的文字
                    ]
                });
            }
            // 如果沒有 Tab（例如標題和星號線），就正常輸出
            return new docx.Paragraph({ text: text });
        };
        
        for (let i = 0; i < maxLen; i++) {
            const zhText = zhParas[i] || "";
            const enText = enParas[i] || "";
            
            tableRows.push(
                new docx.TableRow({
                    children: [
                        new docx.TableCell({
                            width: { size: 50, type: docx.WidthType.PERCENTAGE },
                            // 要求 2: 每段完結後加多一行空行
                            children: [createParagraph(zhText), new docx.Paragraph({ text: "" })],
                        }),
                        new docx.TableCell({
                            width: { size: 50, type: docx.WidthType.PERCENTAGE },
                            // 要求 2: 每段完結後加多一行空行
                            children: [createParagraph(enText), new docx.Paragraph({ text: "" })],
                        }),
                    ],
                })
            );
        }

        const doc = new docx.Document({
            sections: [{
                // 要求 1: 版面設定邊界是上、下、左、右各 1cm (1cm 約為 567 twips)
                properties: {
                    page: {
                        margin: {
                            top: 567,
                            bottom: 567,
                            left: 567,
                            right: 567,
                        },
                    },
                },
                children: [
                    new docx.Table({
                        width: { size: 100, type: docx.WidthType.PERCENTAGE },
                        // 要求 3: 表格框線全部用透明
                        borders: {
                            top: { style: docx.BorderStyle.NONE },
                            bottom: { style: docx.BorderStyle.NONE },
                            left: { style: docx.BorderStyle.NONE },
                            right: { style: docx.BorderStyle.NONE },
                            insideHorizontal: { style: docx.BorderStyle.NONE },
                            insideVertical: { style: docx.BorderStyle.NONE },
                        },
                        rows: tableRows,
                    }),
                ],
            }],
        });

        // 觸發下載
        docx.Packer.toBlob(doc).then(blob => {
            saveAs(blob, `${docTitle}.docx`);
        });
    }
</script>
</body>
</html>
